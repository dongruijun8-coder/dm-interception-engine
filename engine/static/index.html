<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>截流引擎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #ffffff;
  color: #222222;
  font-size: 14px;
  line-height: 1.5;
  display: flex;
  -webkit-font-smoothing: antialiased;
}

/* ── Sidebar ── */
.sidebar {
  width: 220px; min-width: 220px; height: 100vh;
  position: sticky; top: 0;
  background: #f7f8fa;
  border-right: 1px solid #e5e7eb;
  display: flex; flex-direction: column;
  padding: 0; z-index: 100;
}
.sidebar-brand { padding: 24px 20px 20px; }
.sidebar-brand .logo {
  font-size: 16px; font-weight: 700; color: #0a0a0a;
  letter-spacing: -0.3px;
}
.sidebar-brand .sub {
  font-size: 11px; color: #5f5f5f; margin-top: 4px; letter-spacing: 0.2px;
}
.sidebar-nav { flex: 1; padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 6px;
  color: #5f5f5f; font-size: 13px; font-weight: 500;
  cursor: pointer; text-decoration: none;
  transition: background 150ms ease, color 150ms ease;
}
.sidebar-nav a:hover { color: #222222; background: #eaecf0; }
.sidebar-nav a.active { color: #0a0a0a; background: #ffffff; font-weight: 600; }
.sidebar-nav a .nav-icon { font-size: 15px; width: 20px; text-align: center; line-height: 1; }

.sidebar-footer {
  padding: 12px 20px; border-top: 1px solid #e5e7eb;
  font-size: 11px; color: #8e8e93;
}

/* ── Main ── */
.main { flex: 1; overflow-y: auto; }

/* ── View switching ── */
.view { display: none; padding: 32px 40px; }
.view.active { display: block; }

/* ── Page header ── */
.page-hd { margin-bottom: 28px; }
.page-hd h2 { font-size: 22px; font-weight: 700; color: #0a0a0a; letter-spacing: -0.3px; }
.page-hd p { font-size: 13px; color: #5f5f5f; margin-top: 4px; }

/* ── Stats strip ── */
.stats-strip {
  display: flex; gap: 0;
  background: #f7f8fa; border-radius: 12px;
  padding: 0; margin-bottom: 32px;
}
.stat-item {
  flex: 1; padding: 20px 24px;
  border-right: 1px solid #e5e7eb;
}
.stat-item:last-child { border-right: none; }
.stat-item .stat-value {
  font-size: 28px; font-weight: 700; color: #0a0a0a;
  letter-spacing: -1px; line-height: 1.1;
}
.stat-item .stat-label { font-size: 12px; color: #5f5f5f; margin-top: 6px; font-weight: 500; }
.stat-item .stat-sub {
  font-size: 11px; color: #1456f0; margin-top: 4px; font-weight: 600;
  display: flex; align-items: center; gap: 4px;
}

/* ── Section header ── */
.section-hd {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.section-hd h3 { font-size: 15px; font-weight: 600; color: #0a0a0a; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px; border-radius: 9999px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; line-height: 1.4;
  transition: background 150ms ease, opacity 150ms ease;
}
.btn-primary { background: #0a0a0a; color: #ffffff; }
.btn-primary:hover { background: #222222; }
.btn-secondary { background: transparent; color: #0a0a0a; border: 1px solid #0a0a0a; }
.btn-secondary:hover { background: #f7f8fa; }
.btn-ghost { background: transparent; color: #5f5f5f; border: 1px solid #e5e7eb; }
.btn-ghost:hover { background: #f7f8fa; color: #222222; }
.btn-danger { background: transparent; color: #d45656; border: 1px solid #d45656; }
.btn-danger:hover { background: #fef5f5; }
.btn-sm { padding: 5px 12px; font-size: 11px; }

/* ── Task list ── */
.task-list { display: flex; flex-direction: column; gap: 12px; }
.task-card {
  background: #ffffff; border: 1px solid #e5e7eb; border-radius: 16px;
  padding: 20px 24px;
  transition: box-shadow 150ms ease;
}
.task-card:hover { box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.task-card.running { background: #f9faff; border-color: #bfdbfe; }

.task-card .tc-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 12px;
}
.task-card .tc-app {
  display: flex; align-items: center; gap: 8px;
}
.task-card .tc-app .app-avatar {
  width: 36px; height: 36px; border-radius: 10px;
  background: #f7f8fa; border: 1px solid #e5e7eb;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.task-card .tc-app .app-name { font-size: 15px; font-weight: 600; color: #0a0a0a; }
.task-card .tc-app .task-id { font-size: 11px; color: #8e8e93; }

.task-card .tc-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 9999px;
  font-size: 11px; font-weight: 600;
}
.tc-status.running { background: #e8ffea; color: #1ba673; }
.tc-status.done { background: #f7f8fa; color: #5f5f5f; }
.tc-status.failed { background: #fef5f5; color: #d45656; }
.tc-status.pending { background: #f7f8fa; color: #8e8e93; }
.tc-status .dot { width: 6px; height: 6px; border-radius: 50%; }
.tc-status.running .dot { background: #1ba673; }
.tc-status.failed .dot { background: #d45656; }

.task-card .tc-progress {
  height: 4px; background: #f2f3f5; border-radius: 2px;
  margin-bottom: 14px; overflow: hidden;
}
.task-card .tc-progress .bar {
  height: 100%; background: #1456f0; border-radius: 2px;
  transition: width 300ms ease;
}
.task-card .tc-progress .bar.done { background: #1ba673; }
.task-card .tc-progress .bar.failed { background: #d45656; }

.task-card .tc-meta {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
  font-size: 12px;
}
.task-card .tc-meta .meta-item .meta-val { font-weight: 600; color: #0a0a0a; }
.task-card .tc-meta .meta-item .meta-lbl { font-size: 10px; color: #8e8e93; margin-top: 1px; }

.task-card .tc-actions { margin-top: 14px; display: flex; gap: 8px; }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 48px 20px; color: #8e8e93;
}
.empty-state .empty-icon { font-size: 32px; margin-bottom: 8px; }
.empty-state p { font-size: 13px; }

/* ── Account panel ── */
.acct-grid { display: grid; grid-template-columns: 1fr 340px; gap: 32px; }
.acct-list-card {
  background: #ffffff; border: 1px solid #e5e7eb; border-radius: 16px;
  padding: 20px 24px;
}
.acct-list-card h4 { font-size: 14px; font-weight: 600; color: #0a0a0a; margin-bottom: 14px; }
.acct-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.acct-table th {
  text-align: left; padding: 8px 12px; color: #5f5f5f;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; border-bottom: 1px solid #e5e7eb;
}
.acct-table td {
  padding: 8px 12px; border-bottom: 1px solid #f2f3f5; color: #222222;
}
.acct-table td.health-ok { color: #1ba673; }
.acct-table td.health-warn { color: #d29922; }

.acct-form-card {
  background: #f7f8fa; border: 1px solid #e5e7eb; border-radius: 16px;
  padding: 20px 24px; height: fit-content;
}
.acct-form-card h4 { font-size: 14px; font-weight: 600; color: #0a0a0a; margin-bottom: 16px; }

.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 600; color: #222222;
  margin-bottom: 6px;
}
.form-group input, .form-group select {
  width: 100%; padding: 8px 12px; border-radius: 8px;
  border: 1px solid #e5e7eb; background: #ffffff;
  font-family: inherit; font-size: 13px; color: #0a0a0a;
  height: 40px; transition: border 150ms ease;
}
.form-group input:focus, .form-group select:focus {
  outline: none; border-color: #1456f0; border-width: 2px;
}

/* ── Template panel ── */
.tpl-grid { display: grid; grid-template-columns: 1fr 340px; gap: 32px; }
.tpl-list-card {
  background: #ffffff; border: 1px solid #e5e7eb; border-radius: 16px;
  padding: 20px 24px;
}
.tpl-list-card h4 { font-size: 14px; font-weight: 600; color: #0a0a0a; margin-bottom: 14px; }
.tpl-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid #f2f3f5;
}
.tpl-item:last-child { border-bottom: none; }
.tpl-item .tpl-num {
  width: 24px; height: 24px; border-radius: 9999px;
  background: #f7f8fa; color: #5f5f5f;
  font-size: 11px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tpl-item .tpl-text { flex: 1; font-size: 13px; color: #222222; }
.tpl-item .tpl-remove {
  width: 28px; height: 28px; border-radius: 9999px;
  border: 1px solid #e5e7eb; background: #ffffff;
  color: #8e8e93; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 150ms ease;
}
.tpl-item .tpl-remove:hover { border-color: #d45656; color: #d45656; }

.tpl-form-card {
  background: #f7f8fa; border: 1px solid #e5e7eb; border-radius: 16px;
  padding: 20px 24px; height: fit-content;
}
.tpl-form-card h4 { font-size: 14px; font-weight: 600; color: #0a0a0a; margin-bottom: 16px; }
.tpl-form-card textarea {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid #e5e7eb; background: #ffffff;
  font-family: inherit; font-size: 13px; color: #0a0a0a;
  resize: vertical; min-height: 80px;
  transition: border 150ms ease;
}
.tpl-form-card textarea:focus { outline: none; border-color: #1456f0; border-width: 2px; }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,10,10,0.3); z-index: 200;
  justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #ffffff; border: 1px solid #e5e7eb; border-radius: 20px;
  padding: 28px; width: 460px; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 12px 16px -4px rgba(36,36,36,0.08);
}
.modal h3 { font-size: 17px; font-weight: 700; color: #0a0a0a; margin-bottom: 20px; }
.modal .form-group { margin-bottom: 16px; }
.modal .form-group label { font-size: 12px; font-weight: 600; color: #222222; margin-bottom: 6px; display: block; }
.modal .form-group input,
.modal .form-group select {
  width: 100%; padding: 8px 12px; border-radius: 8px;
  border: 1px solid #e5e7eb; background: #ffffff;
  font-family: inherit; font-size: 13px; color: #0a0a0a;
  height: 40px;
}
.modal .form-group input:focus,
.modal .form-group select:focus { outline: none; border-color: #1456f0; border-width: 2px; }
.modal .form-row { display: flex; gap: 12px; }
.modal .form-row .form-group { flex: 1; }
.modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid #f2f3f5; }

/* ── Toast ── */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 10px 16px; border-radius: 10px;
  font-size: 13px; font-weight: 500; color: #ffffff;
  box-shadow: 0 4px 6px rgba(0,0,0,0.08);
  animation: toastIn 200ms ease;
}
.toast.success { background: #1ba673; }
.toast.error { background: #d45656; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Filter chips ── */
.filter-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.filter-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 9999px;
  font-size: 11px; font-weight: 600; color: #5f5f5f;
  background: #f7f8fa; border: 1px solid #e5e7eb;
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">截流引擎</div>
    <div class="sub">Multi-APP DM Automation</div>
  </div>
  <div class="sidebar-nav">
    <a class="active" data-view="dashboard" onclick="switchView('dashboard')">
      <span class="nav-icon">&#9670;</span> 仪表盘
    </a>
    <a data-view="accounts" onclick="switchView('accounts')">
      <span class="nav-icon">&#9881;</span> 账号管理
    </a>
    <a data-view="templates" onclick="switchView('templates')">
      <span class="nav-icon">&#9998;</span> 消息模板
    </a>
  </div>
  <div class="sidebar-footer">v0.1.0</div>
</div>

<!-- Main -->
<div class="main">

  <!-- ═══ Dashboard View ═══ -->
  <div class="view active" id="view-dashboard">
    <div class="page-hd">
      <h2>仪表盘</h2>
      <p>总览所有 APP 的截流私信运行状态</p>
    </div>

    <div class="stats-strip" id="stats"></div>

    <div class="section-hd">
      <h3>任务</h3>
      <button class="btn btn-primary" onclick="showNewTaskModal()">+ 新建任务</button>
    </div>
    <div class="task-list" id="tasks"></div>
  </div>

  <!-- ═══ Accounts View ═══ -->
  <div class="view" id="view-accounts">
    <div class="page-hd">
      <h2>账号管理</h2>
      <p>管理各 APP 的登录账号和凭证</p>
    </div>
    <div class="acct-grid">
      <div class="acct-list-card">
        <h4>已有账号</h4>
        <table class="acct-table">
          <thead><tr><th>APP</th><th>手机号</th><th>状态</th><th>上次检查</th></tr></thead>
          <tbody id="acctTbody"><tr><td colspan="4" style="color:#8e8e93;text-align:center;padding:24px">暂无账号</td></tr></tbody>
        </table>
      </div>
      <div class="acct-form-card">
        <h4>添加账号</h4>
        <div class="form-group">
          <label>APP</label>
          <select id="acctApp" onchange="renderAccounts()"></select>
        </div>
        <div class="form-group">
          <label>手机号</label>
          <input id="acctPhone" placeholder="13800138000">
        </div>
        <div class="form-group">
          <label>Token（可选）</label>
          <input id="acctToken" placeholder="已有 token 直接填入">
        </div>
        <button class="btn btn-primary" onclick="addAccount()" style="width:100%;justify-content:center">添加账号</button>
      </div>
    </div>
  </div>

  <!-- ═══ Templates View ═══ -->
  <div class="view" id="view-templates">
    <div class="page-hd">
      <h2>消息模板</h2>
      <p>配置每个 APP 的私信话术，发送时随机选取一条</p>
    </div>
    <div class="tpl-grid">
      <div class="tpl-list-card">
        <h4 id="tplListTitle">话术列表</h4>
        <div id="tplList"><p style="color:#8e8e93;font-size:13px;padding:12px 0">暂无话术</p></div>
      </div>
      <div class="tpl-form-card">
        <h4>添加话术</h4>
        <div class="form-group">
          <label>APP</label>
          <select id="tplApp" onchange="renderTemplates()"></select>
        </div>
        <div class="form-group">
          <label>话术内容</label>
          <textarea id="tplText" placeholder="输入一条话术，支持 {name} 变量"></textarea>
        </div>
        <button class="btn btn-primary" onclick="addTemplate()" style="width:100%;justify-content:center">添加话术</button>
      </div>
    </div>
  </div>

</div>

<!-- New Task Modal -->
<div class="modal-overlay" id="newTaskModal">
  <div class="modal">
    <h3>新建任务</h3>
    <div class="form-group">
      <label>APP</label>
      <select id="taskApp" onchange="loadTaskAccounts()"></select>
    </div>
    <div class="form-group">
      <label>账号</label>
      <select id="taskAccount"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>性别筛选</label>
        <select id="filterGender">
          <option value="all">全部</option>
          <option value="male">仅男性</option>
          <option value="female">仅女性</option>
        </select>
      </div>
      <div class="form-group">
        <label>排名范围</label>
        <input id="filterRank" type="number" value="50" placeholder="只取前 N 名">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>房间类型</label>
        <select id="filterRoomType">
          <option value="all">全部</option>
          <option value="voice">仅语音厅</option>
          <option value="video">仅视频直播</option>
        </select>
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <div style="display:flex;align-items:center;height:40px;gap:6px">
          <input type="checkbox" id="filterSkipSent" checked style="width:16px;height:16px">
          <label for="filterSkipSent" style="margin:0;font-size:12px">跳过已发送用户</label>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('newTaskModal')">取消</button>
      <button class="btn btn-primary" onclick="createTask()">创建并启动</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
// ── State ──
const API = '/api';
let currentView = 'dashboard';

// ── View Switching ──
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  document.querySelector(`[data-view="${view}"]`).classList.add('active');

  if (view === 'accounts') { loadApps(); renderAccounts(); }
  if (view === 'templates') { loadTplApps(); renderTemplates(); }
  if (view === 'dashboard') refresh();
}

// ── Dashboard ──
async function refresh() {
  if (currentView !== 'dashboard') return;
  await Promise.all([loadStats(), loadTasks()]);
}

async function loadStats() {
  const r = await fetch(API + '/stats');
  const s = await r.json();
  document.getElementById('stats').innerHTML = `
    <div class="stat-item">
      <div class="stat-value">${s.app_count}</div>
      <div class="stat-label">接入 APP</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${s.total_users.toLocaleString()}</div>
      <div class="stat-label">累计拉取用户</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${s.total_sent.toLocaleString()}</div>
      <div class="stat-label">已发私信</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${s.running_tasks}</div>
      <div class="stat-label">运行中任务</div>
      ${s.running_tasks > 0 ? `<div class="stat-sub">&bull; 进行中</div>` : ''}
    </div>
  `;
}

async function loadTasks() {
  const r = await fetch(API + '/tasks');
  const tasks = await r.json();
  const div = document.getElementById('tasks');

  if (tasks.length === 0) {
    div.innerHTML = `<div class="empty-state"><div class="empty-icon">&#9744;</div><p>暂无任务，点击"新建任务"开始</p></div>`;
    return;
  }

  div.innerHTML = tasks.map(t => {
    const running = t.status === 'authenticating' || t.status === 'fetching' || t.status === 'sending';
    const done = t.status === 'done';
    const failed = t.status === 'failed';
    const pct = t.users_fetched > 0 ? Math.round((t.msg_sent || 0) / t.users_fetched * 100) : 0;
    const barClass = done ? 'done' : failed ? 'failed' : '';

    let statusHtml = '';
    if (running) statusHtml = `<span class="tc-status running"><span class="dot"></span>运行中</span>`;
    else if (done) statusHtml = `<span class="tc-status done">已完成</span>`;
    else if (failed) statusHtml = `<span class="tc-status failed"><span class="dot"></span>失败</span>`;
    else statusHtml = `<span class="tc-status pending">等待中</span>`;

    let actionsHtml = '';
    if (done || failed) {
      actionsHtml = `<button class="btn btn-sm btn-secondary" onclick="rerunTask(${t.id})">重新运行</button>`;
    } else if (running) {
      actionsHtml = `<button class="btn btn-sm btn-ghost disabled" disabled>运行中...</button>`;
    } else {
      actionsHtml = `<button class="btn btn-sm btn-primary" onclick="rerunTask(${t.id})">启动</button>`;
    }

    return `
    <div class="task-card ${running ? 'running' : ''}">
      <div class="tc-top">
        <div class="tc-app">
          <div class="app-avatar">&#x1F4F1;</div>
          <div>
            <div class="app-name">${escapeHtml(t.app_name)}</div>
            <div class="task-id">Task #${t.id}</div>
          </div>
        </div>
        ${statusHtml}
      </div>
      <div class="tc-progress"><div class="bar ${barClass}" style="width:${pct}%"></div></div>
      <div class="tc-meta">
        <div class="meta-item"><div class="meta-val">${t.rooms_fetched || 0}</div><div class="meta-lbl">房间</div></div>
        <div class="meta-item"><div class="meta-val">${t.users_fetched || 0}</div><div class="meta-lbl">拉取用户</div></div>
        <div class="meta-item"><div class="meta-val">${t.users_deduped || 0}</div><div class="meta-lbl">去重后</div></div>
        <div class="meta-item"><div class="meta-val">${t.msg_sent || 0}</div><div class="meta-lbl">已发送</div></div>
        <div class="meta-item"><div class="meta-val">${t.msg_success || 0}</div><div class="meta-lbl">成功</div></div>
        <div class="meta-item"><div class="meta-val">${t.msg_failed || 0}</div><div class="meta-lbl">失败</div></div>
      </div>
      <div class="tc-actions">${actionsHtml}</div>
    </div>`;
  }).join('');
}

// ── New Task ──
async function showNewTaskModal() {
  const r = await fetch(API + '/apps');
  const apps = await r.json();
  document.getElementById('taskApp').innerHTML = apps.map(a => `<option value="${a.name}">${a.name}</option>`).join('');
  loadTaskAccounts();
  document.getElementById('newTaskModal').classList.add('show');
}

async function loadTaskAccounts() {
  const app = document.getElementById('taskApp').value;
  const r = await fetch(API + '/accounts?app_name=' + app);
  const accounts = await r.json();
  document.getElementById('taskAccount').innerHTML = accounts.map(a => `<option value="${a.id}">${a.phone || 'ID:' + a.id}</option>`).join('');
}

async function createTask() {
  const app = document.getElementById('taskApp').value;
  const account_id = parseInt(document.getElementById('taskAccount').value);
  if (!account_id) { toast('请先选择账号', 'error'); return; }
  const config = {
    filters: {
      gender: document.getElementById('filterGender').value,
      rank_max: parseInt(document.getElementById('filterRank').value) || null,
      room_type: document.getElementById('filterRoomType').value,
      skip_sent: document.getElementById('filterSkipSent').checked,
    }
  };
  const r = await fetch(API + '/tasks', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({app_name: app, account_id, config})
  });
  const task = await r.json();
  await fetch(API + '/tasks/' + task.id + '/run', {method: 'POST'});
  closeModal('newTaskModal');
  toast('任务已创建并启动', 'success');
  switchView('dashboard');
}

async function rerunTask(id) {
  await fetch(API + '/tasks/' + id + '/run', {method: 'POST'});
  toast('任务已启动', 'success');
  refresh();
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ── Accounts ──
async function loadApps() {
  const r = await fetch(API + '/apps');
  const apps = await r.json();
  const html = apps.map(a => `<option value="${a.name}">${a.name}</option>`).join('');
  document.getElementById('acctApp').innerHTML = html;
  document.getElementById('taskApp').innerHTML = html;
}

async function renderAccounts() {
  const app = document.getElementById('acctApp').value;
  if (!app) return;
  const r = await fetch(API + '/accounts?app_name=' + app);
  const accounts = await r.json();
  const tbody = document.getElementById('acctTbody');
  if (accounts.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:#8e8e93;text-align:center;padding:24px">暂无账号</td></tr>';
    return;
  }
  tbody.innerHTML = accounts.map(a => `
    <tr>
      <td>${escapeHtml(a.app_name)}</td>
      <td>${escapeHtml(a.phone || '-')}</td>
      <td class="health-${a.health_status === 'ok' ? 'ok' : 'warn'}">${a.health_status}</td>
      <td>${a.last_health_check || '-'}</td>
    </tr>
  `).join('');
}

async function addAccount() {
  const app = document.getElementById('acctApp').value;
  const phone = document.getElementById('acctPhone').value;
  const token = document.getElementById('acctToken').value;
  if (!phone) { toast('请输入手机号', 'error'); return; }
  await fetch(API + '/accounts', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({app_name: app, phone, token})
  });
  document.getElementById('acctPhone').value = '';
  document.getElementById('acctToken').value = '';
  toast('账号已添加', 'success');
  renderAccounts();
}

// ── Templates ──
async function loadTplApps() {
  const r = await fetch(API + '/apps');
  const apps = await r.json();
  const html = apps.map(a => `<option value="${a.name}">${a.name}</option>`).join('');
  document.getElementById('tplApp').innerHTML = html;
}

async function renderTemplates() {
  const app = document.getElementById('tplApp').value;
  if (!app) return;
  const r = await fetch(API + '/templates/' + app);
  const data = await r.json();
  const templates = data.templates || [];
  document.getElementById('tplListTitle').textContent = `话术列表 (${templates.length})`;
  const div = document.getElementById('tplList');
  if (templates.length === 0) {
    div.innerHTML = '<p style="color:#8e8e93;font-size:13px;padding:12px 0">暂无话术</p>';
    return;
  }
  div.innerHTML = templates.map((t, i) => `
    <div class="tpl-item">
      <div class="tpl-num">${i + 1}</div>
      <div class="tpl-text">${escapeHtml(t)}</div>
      <button class="tpl-remove" onclick="removeTemplate('${escapeHtml(app)}', ${i})" title="删除">&times;</button>
    </div>
  `).join('');
}

async function addTemplate() {
  const app = document.getElementById('tplApp').value;
  const text = document.getElementById('tplText').value.trim();
  if (!text) { toast('请输入话术内容', 'error'); return; }

  const r = await fetch(API + '/templates/' + app);
  const data = await r.json();
  const templates = [...(data.templates || []), text];
  await fetch(API + '/templates/' + app, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({app_name: app, templates})
  });
  document.getElementById('tplText').value = '';
  toast('话术已添加', 'success');
  renderTemplates();
}

async function removeTemplate(app, index) {
  const r = await fetch(API + '/templates/' + app);
  const data = await r.json();
  const templates = data.templates || [];
  templates.splice(index, 1);
  await fetch(API + '/templates/' + app, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({app_name: app, templates})
  });
  toast('话术已删除', 'success');
  renderTemplates();
}

// ── Toast ──
function toast(msg, type) {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.remove(); }, 2500);
}

// ── Utils ──
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Init ──
loadApps();
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
